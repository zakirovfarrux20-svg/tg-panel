<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Админ-панель</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: var(--tg-theme-bg-color, #17212b);
      color: var(--tg-theme-text-color, #ffffff);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body {
      padding: 24px 20px 32px;
      max-width: 480px;
      margin: 0 auto;
    }
    .header {
      text-align: center;
      margin-bottom: 28px;
    }
    .header-emoji {
      font-size: 48px;
      line-height: 1;
      margin-bottom: 8px;
    }
    .header h1 {
      font-size: 22px;
      font-weight: 600;
      margin: 0 0 4px;
    }
    .header p {
      font-size: 14px;
      color: var(--tg-theme-hint-color, #8a96a3);
      margin: 0;
    }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .btn {
      width: 100%;
      padding: 16px 18px;
      background: var(--tg-theme-secondary-bg-color, #232e3c);
      color: var(--tg-theme-text-color, #ffffff);
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 500;
      text-align: left;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: transform .08s ease, opacity .15s ease, background .15s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active {
      transform: scale(0.98);
      opacity: 0.85;
    }
    .btn-primary {
      background: var(--tg-theme-button-color, #2ea6ff);
      color: var(--tg-theme-button-text-color, #ffffff);
    }
    .btn-emoji {
      font-size: 24px;
      line-height: 1;
      width: 32px;
      text-align: center;
      flex-shrink: 0;
    }
    .btn-text {
      flex: 1;
    }
    .btn-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .btn-desc {
      font-size: 13px;
      color: var(--tg-theme-hint-color, #8a96a3);
      font-weight: 400;
    }
    .btn-primary .btn-desc {
      color: rgba(255,255,255,0.8);
    }
    .footer {
      margin-top: 28px;
      text-align: center;
      font-size: 12px;
      color: var(--tg-theme-hint-color, #8a96a3);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-emoji">👑</div>
    <h1>Админ-панель</h1>
    <p>Управляй ботом в один тап</p>
  </div>

  <div class="actions">
    <button class="btn btn-primary" onclick="send('stats')">
      <span class="btn-emoji">📊</span>
      <span class="btn-text">
        <div class="btn-title">Статистика групп</div>
        <div class="btn-desc">Сколько людей в каждой из 10 групп</div>
      </span>
    </button>

    <button class="btn" onclick="send('poll_new')">
      <span class="btn-emoji">🗳</span>
      <span class="btn-text">
        <div class="btn-title">Создать голосование</div>
        <div class="btn-desc">Да / Нет в любой группе</div>
      </span>
    </button>

    <button class="btn" onclick="send('poll_list')">
      <span class="btn-emoji">📋</span>
      <span class="btn-text">
        <div class="btn-title">Результаты голосований</div>
        <div class="btn-desc">Кто как проголосовал и проценты</div>
      </span>
    </button>
  </div>

  <div class="footer">@PracticeLogBot</div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    tg.enableClosingConfirmation();
    if (tg.setHeaderColor) {
      try { tg.setHeaderColor('secondary_bg_color'); } catch (e) {}
    }

    function send(action) {
      tg.HapticFeedback && tg.HapticFeedback.impactOccurred('light');
      tg.sendData(JSON.stringify({ action: action }));
    }
  </script>
</body>
</html>
